<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>가짜예술가 투표 메모</title>
    <style>
      @page {
        size: A4;
        margin: 10mm;
      }

      :root {
        --paper: #ffffff;
        --ink: #111827;
        --muted: #374151;
        --line: #1f2937;
        --soft-line: #6b7280;
        --accent: #0f2a44;
        --shade: #f3f4f6;
        --space-1: 1.5mm;
        --space-2: 2.5mm;
        --space-3: 4mm;
        --space-4: 6mm;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family:
          "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.35;
        word-break: keep-all;
        overflow-wrap: break-word;
      }

      .page {
        width: 190mm;
        min-height: 277mm;
        margin: 0 auto;
      }

      header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: var(--space-4);
        align-items: end;
        border-bottom: 2pt solid var(--line);
        padding-bottom: var(--space-1);
        margin-bottom: var(--space-2);
      }

      h1 {
        margin: 0 0 var(--space-1);
        color: var(--accent);
        font-size: 19pt;
        line-height: 1.05;
      }

      .notice {
        margin: 0;
        color: var(--muted);
        font-size: 9.6pt;
        font-weight: 700;
      }

      .use-note {
        border: 1.4pt solid var(--line);
        padding: var(--space-1) var(--space-2);
        color: var(--accent);
        font-size: 10pt;
        font-weight: 900;
        text-align: center;
        white-space: nowrap;
      }

      .memos {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-2);
      }

      .memo {
        min-height: 70mm;
        border: 1.6pt dashed var(--line);
        padding: var(--space-2);
        break-inside: avoid;
      }

      .memo-inner {
        min-height: 100%;
        border: 1pt solid var(--soft-line);
        padding: var(--space-2);
      }

      .memo-title {
        display: flex;
        justify-content: space-between;
        gap: var(--space-3);
        align-items: center;
        border-bottom: 1.2pt solid var(--line);
        padding-bottom: var(--space-1);
        margin-bottom: var(--space-1);
        color: var(--accent);
        font-size: 12.5pt;
        font-weight: 900;
      }

      .cut-label {
        color: var(--muted);
        font-size: 8.5pt;
        font-weight: 800;
      }

      .field {
        display: grid;
        grid-template-columns: 36mm 1fr;
        gap: var(--space-2);
        align-items: end;
        margin-top: var(--space-1);
        font-size: 11pt;
        font-weight: 900;
      }

      .field:first-of-type {
        margin-top: 0;
      }

      .blank {
        min-height: 7mm;
        border-bottom: 1.4pt solid var(--line);
      }

      .memo-area {
        margin-top: var(--space-2);
        border: 1pt solid var(--line);
      }

      .memo-area-title {
        margin: 0;
        border-bottom: 1pt solid var(--line);
        background: var(--shade);
        padding: var(--space-1) var(--space-2);
        font-size: 10pt;
        font-weight: 900;
      }

      .memo-lines {
        padding: var(--space-1) var(--space-2) var(--space-2);
      }

      .memo-line {
        height: 7mm;
        border-bottom: 1pt dotted var(--soft-line);
      }

      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        .page {
          width: auto;
          min-height: auto;
        }
      }
    </style>
  </head>
