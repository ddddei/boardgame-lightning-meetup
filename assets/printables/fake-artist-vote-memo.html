<!doctype html>
<html lang="ko">
<head>

  <style>
    @page {
      size: A4;
      margin: 12mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #1f1f1f;
      background: #fff;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", Arial, sans-serif;
      line-height: 1.35;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .page {
      width: 186mm;
      min-height: 273mm;
      margin: 0 auto;
    }

    header {
      border-bottom: 2px solid #222;
      padding-bottom: 3mm;
      margin-bottom: 4mm;
    }

    h1 {
      margin: 0 0 2mm;
      font-size: 22pt;
      letter-spacing: 0;
    }

    .notice {
      margin: 0;
      font-size: 10.5pt;
      font-weight: 700;
    }

    .memos {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4mm;
    }

    .memo {
      min-height: 76mm;
      border: 1.4pt dashed #222;
      padding: 3.8mm;
      break-inside: avoid;
    }

    .memo-head {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4mm;
      margin-bottom: 3mm;
      font-weight: 800;
      font-size: 11pt;
    }

    .blank {
      display: inline-block;
      min-width: 22mm;
      border-bottom: 1.2pt solid #222;
      transform: translateY(-1px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
    }

    th,
    td {
      border: 1px solid #555;
      padding: 2mm 1.8mm;
      vertical-align: top;
    }

    th {
      background: #f2f2f2;
      font-weight: 800;
      text-align: center;
    }

    .name-col {
      width: 34%;
    }

    .vote-col {
      width: 28%;
    }

    .note-col {
      width: 38%;
    }

    .footer-note {
      margin-top: 2mm;
      border-top: 1px dotted #777;
      padding-top: 1.5mm;
      font-size: 9pt;
      color: #444;
      text-align: center;
    }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .page {
        width: auto;
        min-height: auto;
      }
    }
  </style>
</head>
