<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>가짜예술가 역할 카드</title>
    <style>
      @page {
        size: A4;
        margin: 12mm;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #1f1f1f;
        background: #fff;
        font-family:
          "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", Arial,
          sans-serif;
        line-height: 1.35;
      }

      .page {
        width: 186mm;
        min-height: 273mm;
        margin: 0 auto;
        padding: 0;
      }

      header {
        border-bottom: 2px solid #222;
        padding-bottom: 3mm;
        margin-bottom: 4mm;
      }

      h1 {
        margin: 0 0 2mm;
        font-size: 22pt;
        letter-spacing: 0;
      }

      .notice {
        margin: 0;
        font-size: 10.5pt;
        font-weight: 700;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 4mm;
      }

      .card {
        height: 42mm;
        border: 1.6pt dashed #222;
        padding: 3.5mm 4mm;
        break-inside: avoid;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .card-number {
        display: flex;
        justify-content: space-between;
        gap: 6mm;
        font-size: 10pt;
        font-weight: 700;
        color: #444;
      }

      .card-title {
        margin: 2.5mm 0 1.5mm;
        text-align: center;
        font-size: 15pt;
        font-weight: 800;
      }

      .fields {
        border-top: 1px solid #777;
        padding-top: 2mm;
      }

      .field {
        display: grid;
        grid-template-columns: 23mm 1fr;
        gap: 2.5mm;
        align-items: end;
        margin-top: 2mm;
        font-size: 12pt;
        font-weight: 800;
      }

      .field:first-child {
        margin-top: 0;
      }

      .line {
        min-height: 6.5mm;
        border-bottom: 1.2pt solid #222;
        text-align: center;
        font-size: 16pt;
        font-weight: 900;
        line-height: 1.1;
      }

      .x-value {
        font-size: 21pt;
        letter-spacing: 2pt;
      }

      @media print {
        body {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        .page {
          width: auto;
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>가짜예술가 역할 카드</h1>
        <p class="notice">
          8장을 모두 접어 섞은 뒤, 진행자를 포함한 8명에게 1장씩 배부합니다.
          진행자도 자기 카드만 보고 참여합니다.
        </p>
      </header>

      <section class="cards" aria-label="역할 카드 8장">
        <article class="card">
          <div class="card-number">
            <span>카드 1</span><span>역할 카드</span>
          </div>
          <div class="card-title">예술가</div>
          <div class="fields">
            <div class="field">
              <span>카테고리</span><span class="line"></span>
            </div>
            <div class="field"><span>정답</span><span class="line"></span></div>
          </div>
        </article>

        <article class="card">
          <div class="card-number">
            <span>카드 2</span><span>역할 카드</span>
          </div>
          <div class="card-title">예술가</div>
          <div class="fields">
            <div class="field">
              <span>카테고리</span><span class="line"></span>
            </div>
            <div class="field"><span>정답</span><span class="line"></span></div>
          </div>
        </article>

        <article class="card">
          <div class="card-number">
            <span>카드 3</span><span>역할 카드</span>
          </div>
          <div class="card-title">예술가</div>
          <div class="fields">
            <div class="field">
              <span>카테고리</span><span class="line"></span>
            </div>
            <div class="field"><span>정답</span><span class="line"></span></div>
          </div>
        </article>

        <article class="card">
          <div class="card-number">
            <span>카드 4</span><span>역할 카드</span>
          </div>
          <div class="card-title">예술가</div>
          <div class="fields">
            <div class="field">
              <span>카테고리</span><span class="line"></span>
            </div>
            <div class="field"><span>정답</span><span class="line"></span></div>
          </div>
        </article>

        <article class="card">
          <div class="card-number">
            <span>카드 5</span><span>역할 카드</span>
          </div>
          <div class="card-title">예술가</div>
          <div class="fields">
            <div class="field">
              <span>카테고리</span><span class="line"></span>
            </div>
            <div class="field"><span>정답</span><span class="line"></span></div>
          </div>
        </article>

        <article class="card">
          <div class="card-number">
            <span>카드 6</span><span>역할 카드</span>
          </div>
          <div class="card-title">예술가</div>
          <div class="fields">
            <div class="field">
              <span>카테고리</span><span class="line"></span>
            </div>
            <div class="field"><span>정답</span><span class="line"></span></div>
          </div>
        </article>

        <article class="card">
          <div class="card-number">
            <span>카드 7</span><span>역할 카드</span>
          </div>
          <div class="card-title">예술가</div>
          <div class="fields">
            <div class="field">
              <span>카테고리</span><span class="line"></span>
            </div>
            <div class="field"><span>정답</span><span class="line"></span></div>
          </div>
        </article>

        <article class="card">
          <div class="card-number">
            <span>카드 8</span><span>역할 카드</span>
          </div>
          <div class="card-title">가짜예술가</div>
          <div class="fields">
            <div class="field">
              <span>카테고리</span><span class="line"></span>
            </div>
            <div class="field">
              <span>정답</span><span class="line x-value">X</span>
            </div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
